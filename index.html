<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Boy - Living Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #e65c00;
        }

        .art-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .bg-image {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            /* ТУТ ИЗМЕНЕНО: поставили точное имя твоего файла с гитхаба */
            background-image: url('IMG_2266.jpeg'); 
            background-size: cover;
            background-position: center bottom;
            transform-origin: center bottom; 
            animation: tylerBreeze 8s ease-in-out infinite alternate;
            will-change: transform;
        }

        @keyframes tylerBreeze {
            0% { transform: scale(1.02) rotate(-1deg) translate(-5px, 0); }
            50% { transform: scale(1.04) rotate(0.5deg) translate(3px, -5px); }
            100% { transform: scale(1.02) rotate(1deg) translate(5px, 2px); }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="art-container">
        <div class="bg-image"></div>
    </div>

    <canvas id="pollenCanvas"></canvas>

    <script>
        const canvas = document.getElementById('pollenCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const particles = [];
        const particleCount = 40;

        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 2 + 1.5,
                speedX: -(Math.random() * 0.8 + 0.4),
                speedY: (Math.random() - 0.5) * 0.3,
                wobbleSpeed: Math.random() * 0.02 + 0.01,
                wobbleRange: Math.random() * 15,
                angle: Math.random() * Math.PI * 2,
                alpha: Math.random() * 0.5 + 0.3
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.x += p.speedX;
                p.angle += p.wobbleSpeed;
                p.y += p.speedY + Math.sin(p.angle) * 0.2;

                if (p.x < -10) {
                    p.x = canvas.width + 10;
                    p.y = Math.random() * canvas.height;
                }

                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#ffcc00";
                ctx.fillStyle = "rgba(255, 230, 130, 0.8)";
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
