<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>See You Again - Sunflower Field</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace; /* Ретро-вайб альбомов Тайлера */
            background-color: #fce484;
            transition: background-color 2s ease;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Интерфейс поверх поляны */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* Чтобы можно было кликать сквозь текст на холст */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            color: #3d2605;
            text-shadow: 0 2px 4px rgba(255,255,255,0.3);
        }

        .header h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-weight: 900;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.8;
        }

        .footer {
            align-self: flex-end;
            text-align: right;
            pointer-events: auto; /* Делаем кнопку кликабельной */
        }

        .theme-btn {
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid #3d2605;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            color: #3d2605;
            border-radius: 20px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .theme-btn:hover {
            background: #3d2605;
            color: #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <canvas id="fieldCanvas"></canvas>

    <div class="ui-layer">
        <div class="header">
            <h1>SEE YOU AGAIN</h1>
            <p>Тыкни на экран или кнопку, чтобы изменить атмосферу</p>
        </div>
        <div class="footer">
            <button class="theme-btn" id="themeBtn">Сменить время суток</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('fieldCanvas');
        const ctx = canvas.getContext('2d');
        const themeBtn = document.getElementById('themeBtn');

        // Настройки размеров
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Цветовые палитры (Небо верх, Небо низ, Земля, Подсолнух центр)
        const themes = [
            { name: 'Золотой полдень', skyTop: '#96deda', skyBottom: '#fce484', hill: '#799f0c', center: '#3d2605' },
            { name: 'Закат Flower Boy', skyTop: '#e65c00', skyBottom: '#f9d423', hill: '#945403', center: '#2d1400' },
            { name: 'Сумерки Тайлера', skyTop: '#2b1055', skyBottom: '#7597de', hill: '#18206f', center: '#11052c' }
        ];
        let currentThemeIndex = 0;

        // Класс Подсолнуха
        class Sunflower {
            constructor(x, y, height) {
                this.x = x;
                this.y = y; // База стебля
                this.height = height; // Длина стебля
                this.size = Math.random() * 15 + 20; // Размер шляпки
                this.offset = Math.random() * Math.PI * 2; // Разнобой в фазе качания
                this.petalCount = 12;
            }

            draw(time, windSpeed) {
                // Вычисляем наклон от ветра (синусоида)
                let sway = Math.sin(time + this.offset) * (windSpeed * 15);
                let headX = this.x + sway;
                let headY = this.y - this.height;

                let theme = themes[currentThemeIndex];

                // 1. Рисуем стебель (Кривая Безье для реалистичного изгиба)
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.quadraticCurveTo(this.x + sway * 0.3, this.y - this.height * 0.5, headX, headY);
                ctx.strokeStyle = theme.name === 'Сумерки Тайлера' ? '#1f2d63' : '#4d6600';
                ctx.lineWidth = this.size * 0.15;
                ctx.lineCap = 'round';
                ctx.stroke();

                // 2. Рисуем лепестки подсолнуха
                ctx.save();
                ctx.translate(headX, headY);
                ctx.fillStyle = theme.name === 'Сумерки Тайлера' ? '#ff7b00' : '#ffcc00';
                
                for (let i = 0; i < this.petalCount; i++) {
                    ctx.rotate((Math.PI * 2) / this.petalCount);
                    ctx.beginPath();
                    ctx.ellipse(this.size * 0.8, 0, this.size * 0.6, this.size * 0.25, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();

                // 3. Сердцевина цветка
                ctx.beginPath();
                ctx.arc(headX, headY, this.size * 0.6, 0, Math.PI * 2);
                ctx.fillStyle = theme.center;
                ctx.fill();
            }
        }

        // Создаем массив цветов
        let sunflowers = [];
        function initFlowers() {
            sunflowers = [];
            let count = Math.min(window.innerWidth / 15, 90); // Адаптивное количество
            for (let i = 0; i < count; i++) {
                let x = Math.random() * canvas.width;
                // Размещаем цветы ближе к нижней части экрана
                let y = canvas.height + 20;
                let height = Math.random() * (canvas.height * 0.4) + (canvas.height * 0.2);
                sunflowers.push(new Sunflower(x, y, height));
            }
            // Сортируем по высоте стебля, чтобы задние планы перекрывались передними
            sunflowers.sort((a, b) => a.height - b.height);
        }
        initFlowers();
        window.addEventListener('resize', initFlowers);

        // Пыльца/Пчелы в воздухе
        let particles = [];
        for (let i = 0; i < 30; i++) {
            particles.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 2 + 1,
                speedX: Math.random() * 1 + 0.5,
                speedY: Math.sin(Math.random()) * 0.5,
                alpha: Math.random()
            });
        }

        // Переключение тем
        function nextTheme() {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            document.body.style.backgroundColor = themes[currentThemeIndex].skyBottom;
        }
        themeBtn.addEventListener('click', (e) => { e.stopPropagation(); nextTheme(); });
        window.addEventListener('click', nextTheme);

        // Главный цикл анимации
        function animate() {
            let time = Date.now() * 0.002;
            let theme = themes[currentThemeIndex];

            // Градиент неба
            let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0, theme.skyTop);
            skyGrad.addColorStop(0.7, theme.skyBottom);
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Отрисовка дальних холмов
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            for (let x = 0; x <= canvas.width; x += 10) {
                let y = canvas.height * 0.7 + Math.sin(x * 0.004 + time * 0.2) * 15;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.fillStyle = theme.hill;
            ctx.fill();

            // Рисуем летающую пыльцу
            ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY + Math.sin(time + p.x)*0.2;
                if (p.x > canvas.width) p.x = -10;
                if (p.y > canvas.height || p.y < 0) p.y = Math.random() * canvas.height;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Рисуем подсолнухи
            let windSpeed = 1.2; // Можно увеличить для бури
            sunflowers.forEach(flower => flower.draw(time, windSpeed));

            requestAnimationFrame(animate);
        }

        // Первая инициализация цвета body
        document.body.style.backgroundColor = themes[0].skyBottom;
        animate();
    </script>
</body>
</html>
