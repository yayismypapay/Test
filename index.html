<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>Sonary — Music for everyone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="28" height="28">
            <defs>
              <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#22e57e"/>
                <stop offset="100%" stop-color="#0ea34c"/>
              </linearGradient>
            </defs>
            <circle cx="16" cy="16" r="15" fill="url(#brandGrad)"/>
            <path d="M9 13c5-2 11-2 15 1M10 17c4-1.5 9-1.5 13 1M11 21c3-1 7-1 10 1" stroke="#000" stroke-width="2" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
        <span class="brand-name">Sonary</span>
      </div>

      <nav class="nav-primary">
        <button class="nav-item active" data-route="home">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z" fill="currentColor"/></svg>
          <span>Home</span>
        </button>
        <button class="nav-item" data-route="search">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M10 4a6 6 0 1 1 0 12 6 6 0 0 1 0-12m11 16-5.2-5.2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
          <span>Search</span>
        </button>
        <button class="nav-item" data-route="library">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M4 4h2v16H4zM9 4h2v16H9zM14 5l2-.5 4 15-2 .5z" fill="currentColor"/></svg>
          <span>Library</span>
        </button>
      </nav>

      <div class="nav-section">
        <div class="nav-section-title">Your Music</div>
        <button class="nav-item small" data-route="playlists">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M3 6h14v2H3zm0 4h14v2H3zm0 4h10v2H3zm12 0h6v6h-6z" fill="currentColor"/></svg>
          <span>Playlists</span>
        </button>
        <button class="nav-item small" data-route="liked">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 21s-7-4.35-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 11c0 5.65-7 10-7 10z" fill="currentColor"/></svg>
          <span>Liked Songs</span>
        </button>
      </div>

      <div class="sidebar-playlists" id="sidebarPlaylists"></div>
    </aside>

    <!-- Main view -->
    <main class="main" id="main">
      <header class="topbar">
        <div class="topbar-nav">
          <button class="round-btn" id="backBtn" aria-label="Back">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="round-btn" id="fwdBtn" aria-label="Forward">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="topbar-search" id="topbarSearch" hidden>
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M10 4a6 6 0 1 1 0 12 6 6 0 0 1 0-12m11 16-5.2-5.2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
          <input type="text" id="searchInput" placeholder="What do you want to listen to?" autocomplete="off" />
        </div>
      </header>

      <section class="view" id="view"></section>
    </main>
  </div>

  <!-- Player -->
  <footer class="player" id="player">
    <div class="player-track">
      <div class="cover" id="playerCover"></div>
      <div class="player-meta">
        <div class="track-title" id="playerTitle">Choose a song to start listening</div>
        <div class="track-artist" id="playerArtist">—</div>
      </div>
      <button class="icon-btn like-btn" id="likeBtn" aria-label="Like">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 21s-7-4.35-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 11c0 5.65-7 10-7 10z" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>
      </button>
    </div>

    <div class="player-controls">
      <div class="controls-row">
        <button class="icon-btn" id="shuffleBtn" aria-label="Shuffle">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M16 3h5v5M21 3l-7 7M16 21h5v-5M21 21l-7-7M3 7l5 5-5 5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="icon-btn" id="prevBtn" aria-label="Previous">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M6 5v14M20 5L9 12l11 7z" stroke="currentColor" stroke-width="1.8" fill="currentColor" stroke-linejoin="round"/></svg>
        </button>
        <button class="play-btn" id="playBtn" aria-label="Play">
          <svg viewBox="0 0 24 24" width="22" height="22" id="playIcon"><path d="M7 5l12 7-12 7z" fill="currentColor"/></svg>
          <svg viewBox="0 0 24 24" width="22" height="22" id="pauseIcon" hidden><path d="M7 5h4v14H7zM13 5h4v14h-4z" fill="currentColor"/></svg>
        </button>
        <button class="icon-btn" id="nextBtn" aria-label="Next">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M18 5v14M4 5l11 7-11 7z" stroke="currentColor" stroke-width="1.8" fill="currentColor" stroke-linejoin="round"/></svg>
        </button>
        <button class="icon-btn" id="repeatBtn" aria-label="Repeat">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M17 2l4 4-4 4M3 11V9a3 3 0 0 1 3-3h15M7 22l-4-4 4-4M21 13v2a3 3 0 0 1-3 3H3" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="progress-row">
        <span class="time" id="currentTime">0:00</span>
        <div class="progress" id="progress">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div><div class="progress-handle" id="progressHandle"></div></div>
        </div>
        <span class="time" id="totalTime">0:00</span>
      </div>
    </div>

    <div class="player-extra">
      <button class="icon-btn" id="muteBtn" aria-label="Mute">
        <svg viewBox="0 0 24 24" width="18" height="18" id="volIcon"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/><path d="M16 8a5 5 0 0 1 0 8M19 5a9 9 0 0 1 0 14" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>
      </button>
      <div class="volume" id="volume">
        <div class="volume-bar"><div class="volume-fill" id="volumeFill"></div><div class="volume-handle" id="volumeHandle"></div></div>
      </div>
    </div>
  </footer>

  <!-- Mobile bottom nav -->
  <nav class="mobile-nav" id="mobileNav">
    <button class="m-nav-item active" data-route="home">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z" fill="currentColor"/></svg>
      <span>Home</span>
    </button>
    <button class="m-nav-item" data-route="search">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M10 4a6 6 0 1 1 0 12 6 6 0 0 1 0-12m11 16-5.2-5.2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
      <span>Search</span>
    </button>
    <button class="m-nav-item" data-route="library">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M4 4h2v16H4zM9 4h2v16H9zM14 5l2-.5 4 15-2 .5z" fill="currentColor"/></svg>
      <span>Library</span>
    </button>
    <button class="m-nav-item" data-route="liked">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 21s-7-4.35-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 11c0 5.65-7 10-7 10z" fill="currentColor"/></svg>
      <span>Liked</span>
    </button>
  </nav>

  <audio id="audio" preload="metadata"></audio>
  <script src="script.js"></script>
</body>
</html>
