<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Minimalist Aesthetic</title>
    
    <!-- Подключаем изящный современный шрифт Inter из Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Сброс стандартных отступов браузера */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Настройка глубокого темного фона и центрирование контента */
        body {
            background-color: #090a0f;
            color: #ececed;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Контейнер для текста с плавной анимацией появления */
        .card {
            text-align: center;
            max-width: 540px;
            padding: 40px;
            
            /* Начальное состояние для анимации: прозрачный и чуть смещен вниз */
            opacity: 0;
            transform: translateY(30px);
            
            /* Плавное появление (длительность 1.2 секунды с мягким замедлением) */
            animation: elegantAppear 1.2s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
        }

        /* Красивый заголовок с градиентным текстом */
        h1 {
            font-size: 3.5rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 16px;
            
            /* Создаем эффект градиента на буквах */
            background: linear-gradient(135deg, #ffffff 30%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Плавный переход при наведении */
            transition: transform 0.4s ease;
        }

        /* Легкий интерактив: заголовок мягко увеличивается при наведении */
        h1:hover {
            transform: scale(1.02);
        }

        /* Стили для аккуратного, читаемого текста */
        p {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.6;
            color: #9ca3af;
            margin-bottom: 32px;
        }

        /* Интерактивная кнопка с мягким свечением */
        .btn {
            display: inline-block;
            padding: 12px 28px;
            font-size: 0.95rem;
            font-weight: 400;
            color: #ffffff;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            
            /* Плавный переход для всех измененных свойств */
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* Эффект при наведении на кнопку */
        .btn:hover {
            background: #ffffff;
            color: #090a0f;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        /* Ключевые кадры для плавной анимации появления */
        @keyframes elegantAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- Основной контент страницы -->
    <div class="card">
        <h1>Цифровая Эстетика</h1>
        <p>Добро пожаловать в минималистичное пространство. Плавные линии, глубокие темные тона и ничего лишнего — только чистый фокус на главном.</p>
        <a href="#" class="btn">Исследовать</a>
    </div>

</body>
</html>
