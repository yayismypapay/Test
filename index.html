<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackbox Web Studio</title>
    <style>
        /* Современный сброс стилей и CSS-переменные */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Верхняя панель */
        header {
            padding: 15px 20px;
            border-bottom: 1px solid #111111;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #000000;
        }

        header h1 {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            background: linear-gradient(180deg, #ffffff 0%, #a3a3a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #666666;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #00ff66;
            border-radius: 50%;
            box-shadow: 0 0 12px #00ff66;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Главный рабочий сектор */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 16px;
            height: calc(100vh - 55px);
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #030303;
            border: 1px solid #111111;
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .pane:focus-within {
            border-color: #222222;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.02);
        }

        /* Панель навигации по вкладкам */
        .tabs {
            display: flex;
            background: #000000;
            border-bottom: 1px solid #111111;
            padding: 0 8px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #555555;
            padding: 12px 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            transition: color 0.3s ease;
        }

        .tab-btn:hover {
            color: #999999;
        }

        .tab-btn.active {
            color: #ffffff;
        }

        /* Плавное подчеркивание активной вкладки */
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 1px;
            background: #ffffff;
            scale: 0 1;
            transition: scale 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .tab-btn.active::after {
            scale: 1 1;
        }

        /* Контейнер для текстовых полей */
        .editor-wrapper {
            flex: 1;
            position: relative;
            background: #030303;
        }

        .editor-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: #d4d4d4;
            padding: 18px;
            font-family: "Fira Code", Consolas, Monaco, monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        /* Показываем только активный редактор */
        .editor-input.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Заголовок окна предпросмотра */
        .preview-header {
            padding: 12px 20px;
            background: #000000;
            border-bottom: 1px solid #111111;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #555555;
        }

        /* Окно вывода результата */
        iframe {
            width: 100%;
            height: 100%;
            flex: 1;
            border: none;
            background: #000000;
            transition: opacity 0.2s ease;
        }

        .updating {
            opacity: 0.6;
        }

        /* Кастомизация скроллбаров */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: #111111;
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #222222;
        }

        /* Адаптивный дизайн для десктопов */
        @media (min-width: 768px) {
            main {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>BLACKBOX STUDIO</h1>
        <div class="status-container">
            <span id="status-text">Синхронизировано</span>
            <div class="status-dot" id="status"></div>
        </div>
    </header>

    <main>
        <div class="pane">
            <div class="tabs">
                <button class="tab-btn active" data-tab="html">HTML</button>
                <button class="tab-btn" data-tab="css">CSS</button>
                <button class="tab-btn" data-tab="js">JavaScript</button>
            </div>
            <div class="editor-wrapper">
<textarea id="html-editor" class="editor-input active" spellcheck="false" placeholder="">
<div class="card">
    <h2>Интерактивный Элемент</h2>
    <p>Нажми на кнопку ниже, чтобы проверить работу встроенного JS-скрипта.</p>
    <button id="action-btn">Активировать импульс</button>
</div>
</textarea>

<textarea id="css-editor" class="editor-input" spellcheck="false" placeholder="/* Стили здесь */">
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #000000;
}

.card {
    background: #050505;
    border: 1px solid #161616;
    padding: 30px;
    border-radius: 16px;
    text-align: center;
    max-width: 320px;
    transition: transform 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
}

h2 {
    font-size: 1.25rem;
    margin-bottom: 10px;
    font-weight: 400;
}

p {
    color: #666;
    font-size: 0.9rem;
    line-height: 1.5;
    margin-bottom: 20px;
}

button {
    background: #ffffff;
    color: #000000;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

button:hover {
    background: #e5e5e5;
    box-shadow: 0 0 15px rgba(255,255,255,0.2);
}
</style>
</textarea>

<textarea id="js-editor" class="editor-input" spellcheck="false" placeholder="// Скрипты здесь">
const btn = document.getElementById('action-btn');

btn.addEventListener('click', () => {
    btn.style.background = '#00ff66';
    btn.innerText = 'Успешно!';
    
    setTimeout(() => {
        btn.style.background = '#ffffff';
        btn.innerText = 'Активировать импульс';
    }, 1000);
});
</textarea>
            </div>
        </div>

        <div class="pane">
            <div class="preview-header">Live Preview</div>
            <iframe id="preview"></iframe>
        </div>
    </main>

    <script>
        // Инициализация UI элементов
        const tabs = document.querySelectorAll('.tab-btn');
        const editors = document.querySelectorAll('.editor-input');
        const preview = document.getElementById('preview');
        const statusDot = document.getElementById('status');
        const statusText = document.getElementById('status-text');

        // Логика переключения вкладок
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                editors.forEach(e => e.classList.remove('active'));

                tab.classList.add('active');
                const targetId = `${tab.dataset.tab}-editor`;
                document.getElementById(targetId).classList.add('active');
            });
        });

        // Функция сборки проекта воедино
        function compileProject() {
            statusText.innerText = 'Обновление...';
            statusDot.style.backgroundColor = '#00bcd4';
            statusDot.style.boxShadow = '0 0 12px #00bcd4';
            preview.classList.add('updating');

            const htmlContent = document.getElementById('html-editor').value;
            const cssContent = document.getElementById('css-editor').value;
            const jsContent = document.getElementById('js-editor').value;

            const iframeDoc = preview.contentDocument || preview.contentWindow.document;
            
            iframeDoc.open();
            iframeDoc.write(`
                <!DOCTYPE html>
                <html lang="ru">
                <head>
                    <meta charset="UTF-8">
                    <style>
                        /* Дефолтный сброс стилей для песочницы */
                        body { background-color: #000000; color: #ffffff; margin: 0; padding: 20px; font-family: sans-serif; }
                        ${cssContent}
                    </style>
                </head>
                <body>
                    ${htmlContent}
                    <script>
                        // Обертка для безопасного исполнения кода пользователя
                        try {
                            ${jsContent}
                        } catch (err) {
                            console.error("Ошибка выполнения в скрипте проекта:", err.message);
                        }
                    <\/script>
                </body>
                </html>
            `);
            iframeDoc.close();

            // Эффект плавного завершения компиляции
            setTimeout(() => {
                statusText.innerText = 'Синхронизировано';
                statusDot.style.backgroundColor = '#00ff66';
                statusDot.style.boxShadow = '0 0 12px #00ff66';
                preview.classList.remove('updating');
            }, 300);
        }

        // Оптимизация производительности (Debounce) — задержка 350мс при вводе
        let updateTimeout;
        editors.forEach(editor => {
            editor.addEventListener('input', () => {
                clearTimeout(updateTimeout);
                updateTimeout = setTimeout(compileProject, 350);
            });
        });

        // Первая сборка при старте страницы
        window.addEventListener('DOMContentLoaded', compileProject);
    </script>
</body>
</html>
